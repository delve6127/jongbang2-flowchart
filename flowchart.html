<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>종방 플로우차트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #1a1a2e;
      overflow: hidden;
    }

    /* ══════════════════════════════
       툴바
    ══════════════════════════════ */
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 48px;
      background: #13131f;
      border-bottom: 1px solid #2a2a42;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .toolbar-title {
      font-size: 14px;
      font-weight: 700;
      color: #e0deff;
      letter-spacing: -0.3px;
      margin-right: 4px;
      white-space: nowrap;
    }
    .sep { width: 1px; height: 22px; background: #2e2e48; margin: 0 4px; flex-shrink: 0; }

    /* 버튼 기본 */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, opacity .15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.95); }

    .btn-add    { background: #6c63ff; color: #fff; }
    .btn-add:hover { background: #5a52e0; }
    .btn-ghost  { background: #23233a; color: #aaa; border: 1px solid #3a3a55; }
    .btn-ghost:hover { background: #2e2e4a; color: #ddd; }
    .btn.is-disabled { opacity: 0.3; }
    .btn-save   { background: #0984e3; color: #fff; }
    .btn-save:hover { background: #0773c5; }
    .btn-danger { background: transparent; color: #e17055; border: 1px solid #3a3a55; }
    .btn-danger:hover { background: #3a2020; }

    /* 줌 컨트롤 */
    .zoom-group {
      display: flex; align-items: center; gap: 0;
      background: #23233a;
      border: 1px solid #3a3a55;
      border-radius: 6px;
      overflow: hidden;
    }
    .zoom-btn {
      background: transparent; border: none;
      color: #ccc; font-size: 16px; font-weight: 700;
      width: 30px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      font-family: inherit;
    }
    .zoom-btn:hover { background: #3a3a55; color: #fff; }
    .zoom-pct {
      min-width: 46px; text-align: center;
      font-size: 11px; font-weight: 700; color: #999;
      cursor: pointer; padding: 0 2px;
      user-select: none;
    }
    .zoom-pct:hover { color: #fff; }

    .ml-auto { margin-left: auto; }

    /* ══════════════════════════════
       뷰포트 (pan/zoom 영역)
    ══════════════════════════════ */
    #viewport {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      cursor: default;
      background:
        radial-gradient(circle at 1px 1px, #2a2a3e 1px, transparent 0);
      background-size: 28px 28px;
    }
    #viewport.grabbing { cursor: grabbing; }

    /* 실제 컨텐츠 레이어 */
    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      /* transform은 JS로 설정 */
    }

    /* ══════════════════════════════
       플로우 캔버스
    ══════════════════════════════ */
    #canvas {
      padding: 60px 80px 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-width: 600px;
    }

    /* ── 병렬 그룹 ── */
    .parallel-group {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      gap: 110px;   /* 열 사이 공간 = 좌측 태그(~90px) + 여유 */
    }
    .parallel-group::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 60px);
      height: 3px;
      background: #6c63ff;
      border-radius: 2px;
    }

    /* 병렬 열 외부 래퍼: flex:1로 모든 열 동일 너비 → 가운데 열이 항상 중심 */
    .parallel-col-outer {
      flex: 1;
      min-width: 160px;
      display: flex;
      justify-content: center;   /* 내부 parallel-col을 수평 중앙 정렬 */
    }
    /* 병렬 열 태그: parallel-col 기준 절대위치 (열 카드 너비 = 기준점) */
    .parallel-col > .left-tags {
      top: 26px;   /* ::before 드롭라인(26px) 아래에서 시작 */
      padding-right: 8px;
      padding-top: 0;
      padding-bottom: 0;
      align-items: flex-start;
    }

    .parallel-col {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 10px;
      position: relative;
    }
    .parallel-col::before {
      content: '';
      display: block;
      width: 3px; height: 26px;
      background: #6c63ff;
      border-radius: 2px;
    }

    /* ── 카드 ── */
    .card {
      position: relative;
      background: #252538;
      border-radius: 12px;
      padding: 14px 18px;
      min-width: 170px; max-width: 280px;
      width: max-content;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      border-left: 4px solid #6c63ff;
      transition: box-shadow .2s, transform .15s;
      user-select: none;
    }
    .card:hover {
      box-shadow: 0 4px 22px rgba(108,99,255,0.3);
      transform: translateY(-2px);
    }
    .card-title {
      font-size: 14px; font-weight: 700;
      color: #e0deff;
      line-height: 1.35;
      margin-bottom: 2px;
    }
    .card-desc {
      font-size: 11px; color: #888;
      line-height: 1.55;
      margin-top: 5px;
    }
    .card-answer {
      margin-top: 9px;
      font-size: 11px; color: #a29bfe;
      font-weight: 600;
    }
    .card-answer::before { content: '🔑 '; }

    /* 카드 액션 버튼 */
    .card-actions {
      position: absolute; top: 6px; right: 8px;
      display: none; gap: 4px;
    }
    .card:hover .card-actions,
    .outside-card:hover .card-actions { display: flex; }

    /* ══════════════════════════════
       소요시간 인디케이터
    ══════════════════════════════ */
    .step-row {
      position: relative;
    }
    .time-indicator {
      position: absolute;
      left: 100%;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 14px;
      cursor: pointer;
      min-width: 70px;
    }
    .time-indicator:hover .time-text { color: rgba(255,255,255,0.95); }
    .time-line {
      width: 2px;
      background: rgba(255,255,255,0.25);
      border-radius: 1px;
      align-self: stretch;
      transition: background .2s;
    }
    .time-indicator:hover .time-line { background: rgba(255,255,255,0.5); }
    .time-text {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      user-select: none;
      transition: color .2s;
      min-width: 36px;
    }
    .time-text.empty {
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.3px;
    }
    .time-input {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      outline: none;
      width: 72px;
      padding: 0 2px;
    }
    .time-input.time-error {
      border-bottom-color: #e17055;
      width: 140px;
    }
    .time-input.time-error::placeholder { color: #e17055; }

    /* ── 좌측 단어 태그 ── */
    .left-tags {
      position: absolute;
      right: 100%;
      top: 0;
      bottom: 0;
      padding-right: 10px;
      display: flex;
      flex-direction: row;       /* 열이 여러 개일 때 가로로 나열, 오래된 열이 왼쪽 */
      align-items: flex-start;
      gap: 6px;
      padding-top: 6px;
      padding-bottom: 6px;
    }
    .left-tag-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .left-tag {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 4px 7px;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color .15s, background .15s;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .left-tag:hover {
      color: #fff;
      background: rgba(220, 80, 80, 0.25);
    }
    /* 첫 클릭 후 선택 상태 */
    .left-tag.left-tag-selected {
      background: rgba(253, 203, 110, 0.2);
      color: #fdcb6e;
      box-shadow: 0 0 0 1.5px rgba(253, 203, 110, 0.5);
    }
    .left-tag.left-tag-selected:hover {
      background: rgba(220, 80, 80, 0.3);
      color: #fff;
      box-shadow: none;
    }
    .left-tag-add {
      border: none;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      border-radius: 4px;
      width: 22px;
      height: 22px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
      padding: 0;
    }
    .left-tag-add:hover {
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.14);
    }
    .left-tag-input {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.45);
      outline: none;
      width: 72px;
      padding: 2px 4px;
      font-family: inherit;
    }

    /* ── 바깥 카드 ── */
    .outside-card {
      position: absolute;
      background: #252538;
      border-radius: 12px;
      padding: 14px 18px;
      min-width: 170px; max-width: 280px;
      width: max-content;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      border-left: 4px solid #6c63ff;
      border-top: 1px dashed #3a3a55;   /* 플로우 카드와 구분 */
      border-right: 1px dashed #3a3a55;
      border-bottom: 1px dashed #3a3a55;
      cursor: move;
      user-select: none;
      transition: box-shadow .2s;
    }
    .outside-card:hover {
      box-shadow: 0 4px 22px rgba(108,99,255,0.3);
    }
    .outside-card.dragging {
      box-shadow: 0 10px 36px rgba(0,0,0,0.45);
      opacity: 0.88;
      cursor: grabbing;
    }
    .card-act {
      width: 22px; height: 22px;
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .card-act.edit { background: #3a3a5a; color: #ccc; }
    .card-act.del  { background: #4a2828; color: #e17055; }
    .card-act.edit:hover { background: #5a5a80; color: #fff; }
    .card-act.del:hover  { background: #e17055; color: #fff; }

    /* ── 화살표 ── */
    .arrow {
      display: flex; flex-direction: column; align-items: center;
    }
    .arrow-line {
      width: 3px; height: 30px;
      background: #6c63ff; border-radius: 2px;
    }
    .arrow-head {
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 10px solid #6c63ff;
    }

    /* ── 레이블 블록 ── */
    .label-block {
      padding: 7px 20px;
      background: rgba(56, 189, 248, 0.08);
      border: 2px solid #38bdf8;
      border-radius: 8px;
      font-size: 12px; color: #7dd3fc;
      font-weight: 600;
      position: relative;
      user-select: none;
      white-space: nowrap;
    }
    .label-block:hover .card-actions { display: flex; }

    /* ── 시작/끝 노드 ── */
    .node-capsule {
      padding: 9px 30px;
      border-radius: 40px;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
      cursor: pointer;
      transition: box-shadow .2s, transform .15s;
    }
    .node-capsule:hover { transform: translateY(-1px); }
    .node-start { background: #00b894; box-shadow: 0 0 16px rgba(0,184,148,0.4); }
    .node-end   { background: #e17055; box-shadow: 0 0 16px rgba(225,112,85,0.4); }

    /* ── 선택 상태 ── */
    .card {
      cursor: pointer;
    }
    .card.selected {
      border-left-color: #fdcb6e !important;
      box-shadow: 0 0 0 2px #fdcb6e, 0 4px 24px rgba(253,203,110,0.35) !important;
      transform: translateY(-1px);
    }
    .node-capsule.selected {
      outline: 3px solid #fdcb6e;
      outline-offset: 3px;
      transform: translateY(-1px);
    }
    .label-block.selected {
      border-color: #fdcb6e;
      box-shadow: 0 0 0 2px rgba(253,203,110,0.4);
    }

    /* ── 선택 상태 배지 (툴바) ── */
    .sel-badge {
      font-size: 11px;
      color: #fdcb6e;
      background: rgba(253,203,110,0.1);
      border: 1px solid rgba(253,203,110,0.3);
      border-radius: 5px;
      padding: 3px 10px;
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }

    /* ── 화살표 + 삽입존 (합체) ── */
    .arrow-zone {
      display: flex; flex-direction: column; align-items: center;
    }
    .az-line {
      width: 3px; height: 44px;
      background: #6c63ff;
      border-radius: 2px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .arrow-zone:hover .az-line { background: #a29bfe; }
    .dz-plus {
      display: none;
      position: absolute;
      width: 22px; height: 22px;
      background: #6c63ff;
      border: 2.5px solid #13131f;
      color: #fff;
      border-radius: 50%;
      cursor: pointer; font-size: 15px; line-height: 1;
      align-items: center; justify-content: center;
      z-index: 10;
      font-family: inherit;
      box-shadow: 0 2px 10px rgba(108,99,255,0.6);
      transition: background .15s;
    }
    .arrow-zone:hover .dz-plus { display: flex; }
    .dz-plus:hover { background: #5a52e0; }

    /* ── 색상 선택 팝업 ── */
    .color-picker {
      position: fixed; z-index: 600;
      background: #1e1e30;
      border: 1px solid #3a3a55;
      border-radius: 10px;
      padding: 7px 12px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.55);
    }
    .color-picker-label {
      font-size: 10px; color: #666;
      white-space: nowrap; margin-right: 2px;
    }
    .color-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      background: none;
      transition: transform .15s, border-color .15s;
      flex-shrink: 0;
    }
    .color-dot:hover { transform: scale(1.25); }
    .color-dot.active { border-color: #fff; transform: scale(1.15); }

    /* ══════════════════════════════
       팝업 메뉴 (구성 추가)
    ══════════════════════════════ */
    .popup-menu {
      position: fixed; z-index: 500;
      background: #1e1e30;
      border: 1px solid #3a3a55;
      border-radius: 10px;
      padding: 6px 5px;
      display: flex; flex-direction: column; gap: 3px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      min-width: 160px;
    }
    .popup-item {
      background: transparent; color: #ccc;
      border: none; border-radius: 7px;
      padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: left;
      font-family: inherit;
      transition: background .12s, color .12s;
    }
    .popup-item:hover { background: #6c63ff; color: #fff; }
    .popup-section {
      font-size: 10px; color: #555;
      padding: 4px 14px 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ══════════════════════════════
       모달
    ══════════════════════════════ */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .modal {
      background: #1e1e30;
      border: 1px solid #3a3a55;
      border-radius: 14px;
      padding: 26px 28px;
      width: 360px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    }
    .modal h2 {
      font-size: 15px; font-weight: 700;
      color: #e0deff; margin-bottom: 18px;
    }
    .modal label {
      font-size: 11px; font-weight: 600;
      color: #777; display: block; margin-bottom: 5px;
    }
    .modal input, .modal textarea {
      width: 100%;
      background: #13131f;
      border: 1.5px solid #3a3a55;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13px; color: #e0deff;
      margin-bottom: 13px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .modal input:focus, .modal textarea:focus { border-color: #6c63ff; }
    .modal input::placeholder, .modal textarea::placeholder { color: #555; }
    .modal textarea { resize: vertical; min-height: 64px; }
    .modal-btns {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 6px;
    }
    .modal-btns .btn { padding: 8px 18px; font-size: 13px; }

    /* ══════════════════════════════
       병렬 추가 버튼 (컬럼 내부)
    ══════════════════════════════ */
    .col-add-btn {
      margin-top: 10px;
      background: transparent; color: #555;
      border: 1px dashed #3a3a55;
      border-radius: 7px; padding: 5px 14px;
      font-size: 11px; cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .col-add-btn:hover { color: #a29bfe; border-color: #6c63ff; }

    /* ══════════════════════════════
       미니맵 힌트 (좌하단)
    ══════════════════════════════ */
    .hint-bar {
      position: fixed;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: rgba(30,30,48,0.85);
      border: 1px solid #3a3a55;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 11px; color: #666;
      pointer-events: none;
      white-space: nowrap;
    }
  /* ══════════════════════════════
     비밀번호 오버레이
  ══════════════════════════════ */
  #pw-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
  }
  #pw-overlay.hidden { display: none; }
  .pw-box {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    background: #13131f;
    border: 1px solid #2a2a42;
    border-radius: 16px;
    padding: 40px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .pw-title {
    font-size: 18px; font-weight: 700; color: #e0deff; letter-spacing: -0.3px;
  }
  .pw-sub {
    font-size: 12px; color: #666; margin-top: -8px;
  }
  .pw-input {
    width: 180px; padding: 10px 16px;
    background: #23233a; border: 1.5px solid #3a3a55;
    border-radius: 8px; color: #e0deff;
    font-size: 20px; font-weight: 700; letter-spacing: 6px;
    text-align: center; outline: none;
    font-family: inherit;
    transition: border-color .2s;
  }
  .pw-input:focus { border-color: #6c63ff; }
  .pw-btn {
    width: 180px; padding: 10px;
    background: #6c63ff; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .pw-btn:hover { background: #5a52e0; }
  .pw-error {
    font-size: 12px; color: #e17055; font-weight: 600;
    min-height: 16px;
  }

  /* ══════════════════════════════
     모바일 툴바 (세로 화면)
  ══════════════════════════════ */
  @media (max-width: 680px) {
    .toolbar {
      height: auto;

  <!-- ══════════════════════════════
       Firebase Firestore 실시간 동기화
  ══════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjZARWrcukOmp9GMMV8fnFeP40Fm6PJrc",
      authDomain: "jongbang2-flowchart.firebaseapp.com",
      projectId: "jongbang2-flowchart",
      storageBucket: "jongbang2-flowchart.firebasestorage.app",
      messagingSenderId: "644407834627",
      appId: "1:644407834627:web:33a4b2339dc118d2a83636",
      measurementId: "G-LWYRQ0NFR5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, 'flowcharts', 'main');

    // 내가 방금 저장한 변경사항이 다시 들어오는 걸 무시하는 플래그
    let _ignoreNext = false;

    // 전역 저장 함수 (기존 saveData에서 호출)
    // Firestore는 배열 안에 배열을 지원하지 않으므로 JSON 문자열로 통째로 저장
    window.fbSave = async function(data) {
      try {
        _ignoreNext = true;
        await setDoc(docRef, { payload: JSON.stringify(data) });
        return true;
      } catch(e) {
        _ignoreNext = false;
        console.error('Firestore 저장 실패:', e);
        return false;
      }
    };

    // 실시간 리스너
    let _firstSnapshot = true;
    onSnapshot(docRef, (snapshot) => {
      // 내가 방금 저장한 것이면 무시
      if (_ignoreNext) {
        _ignoreNext = false;
        return;
      }
      if (!snapshot.exists()) {
        _firstSnapshot = false;
        return;
      }
      // payload 필드에서 JSON 파싱
      const raw = snapshot.data();
      const data = raw.payload ? JSON.parse(raw.payload) : raw;
      if (_firstSnapshot) {
        // 첫 로드: 클라우드 데이터로 초기화 (로컬보다 클라우드 우선)
        _firstSnapshot = false;
        if (window.fbOnFirstLoad) window.fbOnFirstLoad(data);
      } else {
        // 이후: 다른 기기에서 변경된 것
        if (window.fbOnUpdate) window.fbOnUpdate(data);
      }
    }, (error) => {
      _firstSnapshot = false;
      console.error('Firestore 연결 오류:', error);
    });
  </script>
</head>

<script>
/* ════ 비밀번호 잠금 ════ */
(function() {
  const PW_KEY = 'jb_auth';
  const CORRECT = '0616';
  if (localStorage.getItem(PW_KEY) === 'ok') {
    // 이미 인증된 기기 → 오버레이 바로 숨기기
    document.getElementById('pw-overlay').classList.add('hidden');
    return;
  }
  // 엔터키로도 입력 가능
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('pw-input');
    if (input) {
      input.focus();
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPassword();
      });
    }
  });
  window.checkPassword = function() {
    const val = document.getElementById('pw-input').value;
    if (val === CORRECT) {
      localStorage.setItem(PW_KEY, 'ok');
      document.getElementById('pw-overlay').classList.add('hidden');
    } else {
      document.getElementById('pw-error').textContent = '비밀번호가 틀렸어요 🙅';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  };
})();

/* ════════════════════════════════════════
   데이터 구조
   steps: Step[]
   Step  : { kind:'serial'|'parallel'|'label', cards?:Card[], cols?:Card[][], text?:string }
   Card  : { id, title, desc, answer }
════════════════════════════════════════ */

let steps        = [];
let outsideCards = []; // 플로우 바깥 자유 배치 카드: { id, title, desc, answer, color, x, y }
let editTarget   = null; // { stepIdx, colIdx?, cardIdx?, mode?:'label' }
let pendingAdd   = null; // { kind, stepIdx, colIdx? }
let selectedNode = null; // null | {kind:'start'} | {kind:'end'} | {kind:'step', si:number}
let draggingOutside = null; // 바깥 카드 드래그 상태: { id, startMouseX, startMouseY, startCardX, startCardY }

/* ── 실행 취소/다시 하기 ── */
let undoStack = [];  // 최대 20개
let redoStack = [];

/* ── 태그 하이라이트 상태 (render 후에도 유지) ── */
let selectedTagTexts = {};  // { "s-{si}": Set<tagText>, "p-{si}-{colIdx}": Set<tagText> }
function _tagSet(key) {
  if (!selectedTagTexts[key]) selectedTagTexts[key] = new Set();
  return selectedTagTexts[key];
}

/* ── 선택 ── */
function selectNode(node) {
  // 기존 선택 해제
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
  selectedNode = node;

  if (node) {
    if (node.kind === 'start' || node.kind === 'end') {
      document.querySelector(`[data-nodeid="${node.kind}"]`)?.classList.add('selected');
    } else {
      document.querySelectorAll(`[data-si="${node.si}"]`).forEach(el => el.classList.add('selected'));
    }
  }

  // 툴바 배지 업데이트
  const badge = document.getElementById('sel-badge');
  if (!node) {
    badge.style.display = 'none';
  } else {
    let label = '';
    if (node.kind === 'start')      label = '▶ START 선택됨';
    else if (node.kind === 'end')   label = '■ END 선택됨';
    else {
      const step = steps[node.si];
      if (!step) { badge.style.display = 'none'; selectedNode = null; return; }
      if (step.kind === 'serial')   label = `"${step.cards[0]?.title || ''}" 선택됨`;
      else if (step.kind === 'parallel') label = `병렬 그룹 선택됨`;
      else if (step.kind === 'label')    label = `"${step.text}" 선택됨`;
    }
    badge.textContent = label;
    badge.style.display = 'inline-block';
  }
}

const uid = () => Math.random().toString(36).slice(2,9);

/* ════ 실행 취소 / 다시 하기 ════ */
function _snapshot() {
  return JSON.stringify({ steps, outsideCards });
}
function pushHistory() {
  undoStack.push(_snapshot());
  if (undoStack.length > 20) undoStack.shift();
  redoStack = [];
  _updateUndoRedoBtns();
}
function histUndo() {
  if (!undoStack.length) return;
  redoStack.push(_snapshot());
  const state = JSON.parse(undoStack.pop());
  steps = state.steps;
  outsideCards = state.outsideCards;
  render();
  _updateUndoRedoBtns();
  showToast('↩ 되돌렸어요');
}
function histRedo() {
  if (!redoStack.length) return;
  undoStack.push(_snapshot());
  const state = JSON.parse(redoStack.pop());
  steps = state.steps;
  outsideCards = state.outsideCards;
  render();
  _updateUndoRedoBtns();
  showToast('↪ 다시 했어요');
}
function _updateUndoRedoBtns() {
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if (u) {
    if (undoStack.length === 0) u.classList.add('is-disabled');
    else u.classList.remove('is-disabled');
  }
  if (r) {
    if (redoStack.length === 0) r.classList.add('is-disabled');
    else r.classList.remove('is-disabled');
  }
}

/* ════ 저장/로드 ════ */
function saveData() {
  try {
    // Set은 JSON 직렬화 불가 → 배열로 변환해서 저장
    const tagsSerial = {};
    for (const [k, v] of Object.entries(selectedTagTexts)) {
      if (v.size > 0) tagsSerial[k] = [...v];
    }
    const data = { steps, outsideCards, pan: { x: panX, y: panY }, scale, selectedTagTexts: tagsSerial };
    localStorage.setItem('jongbang_flow_v2', JSON.stringify(data));
    // Firebase Firestore에도 저장 (클라우드 동기화)
    if (window.fbSave) {
      window.fbSave(data).then(ok => {
        showToast(ok ? '저장됐어요! ☁️ 클라우드 동기화 완료' : '저장됐어요! (오프라인 - 로컬만 저장됨)');
      });
    } else {
      showToast('저장됐어요! (브라우저 로컬 보관)');
    }
  } catch(e) { alert('저장 실패: ' + e.message); }
}

// 데이터 적용 공통 함수 (로컬/클라우드 모두 사용)
function _applyData(d) {
  steps        = d.steps        || d || [];
  outsideCards = d.outsideCards || [];
  if (d.pan) { panX = d.pan.x; panY = d.pan.y; }
  if (d.scale) scale = d.scale;
  // 태그 하이라이트 상태 복원 (배열 → Set)
  if (d.selectedTagTexts) {
    selectedTagTexts = {};
    for (const [k, v] of Object.entries(d.selectedTagTexts)) {
      selectedTagTexts[k] = new Set(v);
    }
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem('jongbang_flow_v2')
             || localStorage.getItem('jongbang_flow'); // 구버전 호환
    if (!raw) return;
    _applyData(JSON.parse(raw));
  } catch(e) {}
}

// Firebase: 앱 열 때 클라우드 데이터로 초기화 (클라우드 우선)
window.fbOnFirstLoad = function(data) {
  _applyData(data);
  localStorage.setItem('jongbang_flow_v2', JSON.stringify(data));
  render();
};

// Firebase: 다른 기기에서 저장했을 때 실시간 업데이트
window.fbOnUpdate = function(data) {
  _applyData(data);
  render();
  showToast('📱 다른 기기에서 업데이트됐어요!');
};
function resetAll() {
  steps = [];
  selectedTagTexts = {};
  render();
}

/* ════ 토스트 ════ */
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = `
      position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
      background:#6c63ff; color:#fff; font-size:12px; font-weight:600;
      padding:8px 20px; border-radius:20px; z-index:9999;
      box-shadow:0 4px 16px rgba(108,99,255,0.4);
      pointer-events:none; transition:opacity .3s;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

/* ════ 팝업 메뉴 ════ */
function openPopup(anchorEl, items) {
  closePopup();
  const popup = document.createElement('div');
  popup.className = 'popup-menu';
  popup.id = '_popup';
  items.forEach(item => {
    if (item.section) {
      const s = document.createElement('div');
      s.className = 'popup-section';
      s.textContent = item.section;
      popup.appendChild(s);
      return;
    }
    const b = document.createElement('button');
    b.className = 'popup-item';
    b.textContent = item.label;
    b.onclick = () => { closePopup(); item.fn(); };
    popup.appendChild(b);
  });
  document.body.appendChild(popup);

  const rect = anchorEl.getBoundingClientRect();
  let top  = rect.bottom + 6;
  let left = rect.left;
  if (left + 180 > window.innerWidth) left = window.innerWidth - 185;
  popup.style.top  = top  + 'px';
  popup.style.left = left + 'px';

  setTimeout(() => {
    document.addEventListener('click', _popupOutside);
  }, 10);
}
function _popupOutside(e) {
  const p = document.getElementById('_popup');
  if (p && !p.contains(e.target)) closePopup();
}
function closePopup() {
  const p = document.getElementById('_popup');
  if (p) { p.remove(); document.removeEventListener('click', _popupOutside); }
}

/* ── 툴바 "구성 추가" 버튼 ── */
function openAddMenuMain(btn) {
  // 선택된 노드에 따라 삽입 위치 결정
  let before = undefined; // stepIdx: 이 앞에 삽입
  let after  = undefined; // stepIdx: 이 뒤에 삽입

  if (!selectedNode) {
    // 아무것도 선택 안 됨 → 맨 끝에 추가
    after = steps.length;
  } else if (selectedNode.kind === 'start') {
    after = 0;                // START 뒤 = 맨 앞
  } else if (selectedNode.kind === 'end') {
    before = steps.length;   // END 앞 = 맨 뒤
  } else {
    before = selectedNode.si;
    after  = selectedNode.si + 1;
  }

  const items = [];

  if (before !== undefined) {
    const sectionLabel = selectedNode?.kind === 'end' ? '■ END 앞에 추가'
                       :                               '↑ 선택 카드 앞에 추가';
    items.push({ section: sectionLabel });
    items.push({ label: '＋ 카드',     fn: () => addCardModal('serial',   before) });
    items.push({ label: '⇌ 병렬 카드', fn: () => addCardModal('parallel', before) });
    items.push({ label: '🏷 레이블',   fn: () => addLabelModal(before) });
  }

  if (after !== undefined) {
    const sectionLabel = selectedNode?.kind === 'start' ? '▶ START 뒤에 추가'
                       : selectedNode          ? '↓ 선택 카드 뒤에 추가'
                       :                         '맨 끝에 추가';
    items.push({ section: sectionLabel });
    items.push({ label: '＋ 카드',     fn: () => addCardModal('serial',   after) });
    items.push({ label: '⇌ 병렬 카드', fn: () => addCardModal('parallel', after) });
    items.push({ label: '🏷 레이블',   fn: () => addLabelModal(after) });
  }

  // 바깥 카드는 위치 무관 → 항상 하단에 표시
  items.push({ section: '── 플로우 외부 ──' });
  items.push({ label: '📌 바깥 카드 추가', fn: () => addOutsideCardModal() });

  openPopup(btn, items);
}

/* ── 드롭존 "+" 버튼 ── */
function openAddMenu(insertIdx, btn) {
  openPopup(btn, [
    { section: '직렬 (순차)' },
    { label: '＋ 여기에 카드',     fn: () => addCardModal('serial', insertIdx) },
    { section: '병렬 (동시 진행)' },
    { label: '⇌ 여기에 병렬 카드', fn: () => addCardModal('parallel', insertIdx) },
    { section: '구분' },
    { label: '🏷 여기에 레이블',   fn: () => addLabelModal(insertIdx) },
    { section: '── 플로우 외부 ──' },
    { label: '📌 바깥 카드 추가',  fn: () => addOutsideCardModal() },
  ]);
}

/* ════ 모달 ════ */
function addCardModal(kind, stepIdx) {
  pendingAdd = { kind, stepIdx };
  editTarget = null;
  document.getElementById('modal-title').textContent =
    kind === 'parallel' ? '병렬 카드 추가' : '카드 추가';
  clearCardForm();
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-title').focus(), 30);
}
function editCardModal(si, colIdx, ci) {

  document.getElementById('m-title').value  = card.title;

function clearCardForm() {
  document.getElementById('m-title').value  = '';
  document.getElementById('m-desc').value   = '';
  document.getElementById('m-answer').value = '';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function confirmModal() {
  const title  = document.getElementById('m-title').value.trim();
  const desc   = document.getElementById('m-desc').value.trim();
  const answer = document.getElementById('m-answer').value.trim();
  const isOutside = pendingAdd && (pendingAdd.kind === 'outside' || pendingAdd.kind === 'outside_edit');
  if (!title && !isOutside) { document.getElementById('m-title').focus(); return; }

  const card = { id: uid(), title, desc, answer };

  pushHistory(); // 변경 전 스냅샷 저장

  // 바깥 카드 신규 추가
  if (pendingAdd && pendingAdd.kind === 'outside') {
    const vw = viewport.offsetWidth;
    const vh = viewport.offsetHeight;
    const x = (vw / 2 - panX) / scale + 320 + (outsideCards.length % 5) * 18;
    const y = (vh / 2 - panY) / scale - 80 + (outsideCards.length % 5) * 18;
    outsideCards.push({ ...card, x, y });
    closeModal();
    renderOutsideCards();
    return;
  }
  // 바깥 카드 편집
  if (pendingAdd && pendingAdd.kind === 'outside_edit') {
    const oc = outsideCards.find(c => c.id === pendingAdd.id);
    if (oc) { oc.title = title; oc.desc = desc; oc.answer = answer; }
    closeModal();
    renderOutsideCards();
    return;
  }

  if (pendingAdd && pendingAdd.kind === '_parallelCol') {
    steps[pendingAdd.stepIdx].cols[pendingAdd.colIdx].push(card);
  } else if (editTarget) {
    const step = steps[editTarget.stepIdx];
    if (step.kind === 'parallel') step.cols[editTarget.colIdx][editTarget.cardIdx] = card;
    else                          step.cards[editTarget.cardIdx] = card;
  } else {
    const { kind, stepIdx } = pendingAdd;
    if (kind === 'serial') {
      steps.splice(stepIdx, 0, { kind: 'serial', cards: [card] });
    } else {
      // 바로 앞이 parallel이면 컬럼 추가, 아니면 새 parallel step
      const prev = steps[stepIdx - 1];
      if (prev && prev.kind === 'parallel') {
        prev.cols.push([card]);
        if (!prev.colTags) prev.colTags = prev.cols.map(() => []);
        else prev.colTags.push([]);
      } else {
        steps.splice(stepIdx, 0, { kind: 'parallel', cols: [[card]], colTags: [[]] });
      }
    }
  }

  closeModal();
  render();
}

/* ════ 삭제 ════ */
function deleteCard(si, colIdx, ci) {

    step.cols[colIdx].splice(ci, 1);
    if (step.cols[colIdx].length === 0) step.cols.splice(colIdx, 1);
    if (step.cols.length === 0) steps.splice(si, 1);
  } else {
    step.cards.splice(ci, 1);
    if (step.cards.length === 0) steps.splice(si, 1);
  }

/* ════ 렌더링 ════ */
function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';

  canvas.appendChild(makeCapsule('START', 'start'));

  steps.forEach((step, si) => {
    // 화살표 + 삽입 버튼이 합쳐진 요소 (카드와 카드 사이를 연결)
    canvas.appendChild(makeArrowDropzone(si));

    if (step.kind === 'label') {
      canvas.appendChild(makeLabelBlock(step, si));
    } else if (step.kind === 'serial') {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.appendChild(makeLeftTags(si));
      step.cards.forEach((card, ci) => row.appendChild(makeCard(card, si, null, ci)));
      row.appendChild(makeTimeIndicator(si));
      canvas.appendChild(row);
    } else if (step.kind === 'parallel') {
      const row = document.createElement('div');
      row.className = 'step-row';
      // 병렬 스텝은 열별로 태그를 붙이므로 스텝 전체 태그는 사용하지 않음
      row.appendChild(makeParallelGroup(step, si));
      row.appendChild(makeTimeIndicator(si));
      canvas.appendChild(row);
    }
  });

  // 마지막 화살표 + 삽입 버튼
  canvas.appendChild(makeArrowDropzone(steps.length));
  canvas.appendChild(makeCapsule('END', 'end'));

  // 선택 상태 복원 (render 후 DOM이 새로 그려지므로)
  if (selectedNode) selectNode(selectedNode);

  // 바깥 카드 렌더
  renderOutsideCards();

  // 총 소요시간 업데이트
  updateTotalTime();
}

const TIME_UNIT_RE = /^[\d\s.,]*\s*(초|분|시간|일|주|개월|년|세기)$/;
function isValidTimeInput(val) {
  return !val || TIME_UNIT_RE.test(val.trim());

/* ════ 총 소요시간 합산 ════ */
const TIME_TO_SEC = { '초':1, '분':60, '시간':3600, '일':86400, '주':604800, '개월':2592000, '년':31536000, '세기':3153600000 };
const SEC_UNITS   = [
  { name:'세기', sec:3153600000 },
  { name:'년',   sec:31536000   },
  { name:'개월', sec:2592000    },
  { name:'일',   sec:86400      },
  { name:'시간', sec:3600       },
  { name:'분',   sec:60         },
  { name:'초',   sec:1          },
];

function parseTimeSec(timeStr) {
  if (!timeStr) return 0;
  const m = timeStr.trim().match(/^([\d.,]+)?\s*(초|분|시간|일|주|개월|년|세기)$/);
  if (!m) return 0;
  const num = (m[1] !== undefined && m[1] !== '') ? parseFloat(m[1].replace(',', '.')) : 1;
  return num * (TIME_TO_SEC[m[2]] || 0);
}

function formatTotalSec(totalSec) {
  if (!totalSec) return '';
  let rem = Math.round(totalSec);
  const parts = [];
  for (const u of SEC_UNITS) {
    const cnt = Math.floor(rem / u.sec);
    if (cnt > 0) { parts.push(cnt + u.name); rem -= cnt * u.sec; }
  }
  return parts.join(' ');
}

function updateTotalTime() {
  const el = document.getElementById('total-time-display');
  if (!el) return;
  const totalSec = steps.reduce((sum, s) => sum + parseTimeSec(s.time), 0);
  const text = formatTotalSec(totalSec);
  el.textContent = text ? '예상 플레이 타임 : ' + text : '';
  el.style.display = text ? 'inline-flex' : 'none';
}

function makeLeftTags(si) {
  const step = steps[si];
  if (!step.tags) step.tags = [];

  const wrap = document.createElement('div');
  wrap.className = 'left-tags';

  const COLS = 5; // 열 당 최대 태그 수

  // 태그 배열을 5개씩 청크로 나누기
  // 예: 7개 → [[0..4], [5..6]]
  const totalTags = step.tags.length;
  const numFullCols = Math.floor(totalTags / COLS);
  // 마지막 열에 들어갈 태그 수 (0이면 꽉 찬 열만 존재)
  const remainder = totalTags % COLS;

  // 전체 열 수: 최소 1열 (+ 버튼이 들어갈 공간 필요)
  const numCols = numFullCols + (remainder > 0 ? 1 : 0) || 1;

  for (let col = 0; col < numCols; col++) {
    const colDiv = document.createElement('div');
    colDiv.className = 'left-tag-col';

    const startIdx = col * COLS;
    const endIdx = Math.min(startIdx + COLS, totalTags);

    for (let ti = startIdx; ti < endIdx; ti++) {
      const tag = step.tags[ti];
      const el = document.createElement('div');
      el.className = 'left-tag';
      el.textContent = tag;
      const tagKey = `s-${si}`;
      // 저장된 하이라이트 상태 복원
      if (_tagSet(tagKey).has(tag)) {
        el.classList.add('left-tag-selected');
        el.title = '다시 클릭하면 삭제';
      } else {
        el.title = '클릭하면 선택';
      }
      (function(capturedTi, tagText) {
        el.addEventListener('click', e => {
          e.stopPropagation();
          if (el.classList.contains('left-tag-selected')) {
            // 두 번째 클릭 → 삭제
            _tagSet(tagKey).delete(tagText);
            pushHistory();
            step.tags.splice(capturedTi, 1);
            render();
          } else {
            // 첫 번째 클릭 → 노란색 하이라이트 (상태 저장)
            _tagSet(tagKey).add(tagText);
            el.classList.add('left-tag-selected');
            el.title = '다시 클릭하면 삭제';
          }
        });
      })(ti, tag);
      colDiv.appendChild(el);
    }

    // ＋ 추가 버튼은 마지막 열에만
    if (col === numCols - 1) {
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'left-tag-add';
      addBtn.title = '단어 추가';
      addBtn.textContent = '＋';
      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        addBtn.style.display = 'none';

        const input = document.createElement('input');
        input.className = 'left-tag-input';
        input.maxLength = 14;
        colDiv.appendChild(input);
        input.focus();

        let done = false;
        const confirm = () => {
          if (done) return;
          done = true;
          const val = input.value.trim();
          if (val) { pushHistory(); step.tags.push(val); }
          render();
        };
        input.addEventListener('blur', confirm);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); confirm(); }
          if (e.key === 'Escape') { done = true; render(); }
        });
      });
      colDiv.appendChild(addBtn);
    }

    wrap.appendChild(colDiv);
  }

  return wrap;
}

/* 병렬 열별 좌측 태그 */

      const el = document.createElement('div');
      el.className = 'left-tag';
      el.textContent = tag;

        el.classList.add('left-tag-selected');
        el.title = '다시 클릭하면 삭제';

        el.title = '클릭하면 선택';
      }
      (function(capturedTi, tagText) {
        el.addEventListener('click', e => {
          e.stopPropagation();
          if (el.classList.contains('left-tag-selected')) {
            // 두 번째 클릭 → 삭제
            _tagSet(tagKey).delete(tagText);
            pushHistory();
            tags.splice(capturedTi, 1);
            render();
          } else {
            // 첫 번째 클릭 → 노란색 하이라이트 (상태 저장)
            _tagSet(tagKey).add(tagText);
            el.classList.add('left-tag-selected');
            el.title = '다시 클릭하면 삭제';
          }
        });
      })(ti, tag);
      colDiv.appendChild(el);
    }

    if (col === numCols - 1) {
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'left-tag-add';
      addBtn.title = '단어 추가';
      addBtn.textContent = '＋';
      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        addBtn.style.display = 'none';
        const input = document.createElement('input');
        input.className = 'left-tag-input';
        input.maxLength = 14;
        colDiv.appendChild(input);
        input.focus();
        let done = false;
        const confirm = () => {
          if (done) return;
          done = true;
          const val = input.value.trim();
          if (val) { pushHistory(); tags.push(val); }
          render();
        };
        input.addEventListener('blur', confirm);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); confirm(); }
          if (e.key === 'Escape') { done = true; render(); }
        });
      });
      colDiv.appendChild(addBtn);
    }

    wrap.appendChild(colDiv);
  }

  return wrap;
}

function makeTimeIndicator(si) {
  const step = steps[si];
  const hasTime = step.time && step.time.trim();

  const wrap = document.createElement('div');
  wrap.className = 'time-indicator';

  const line = document.createElement('div');
  line.className = 'time-line';

  const text = document.createElement('span');
  text.className = 'time-text' + (hasTime ? '' : ' empty');
  text.textContent = hasTime ? step.time : '+ 시간';

  wrap.appendChild(line);
  wrap.appendChild(text);

  wrap.addEventListener('click', () => {
    const input = document.createElement('input');
    input.className = 'time-input';
    input.value = step.time || '';
    input.placeholder = '예: 10분';
    text.replaceWith(input);
    input.focus();
    input.select();

    let saved = false;
    let errorRefocusing = false;

    const save = () => {
      if (saved) return;
      const newVal = input.value.trim();

      // 유효하지 않은 단위 입력 시 에러 표시 후 재입력 유도
      if (!isValidTimeInput(newVal)) {
        input.value = '';
        input.placeholder = '시간을 입력해 주세요';
        input.classList.add('time-error');
        errorRefocusing = true;
        setTimeout(() => { input.focus(); errorRefocusing = false; }, 0);
        return;
      }

      saved = true;
      if (newVal !== (step.time || '')) {
        pushHistory();
        step.time = newVal;
      }
      render();
    };

    input.addEventListener('blur', () => {
      if (errorRefocusing) return; // 에러 후 재포커스 중이면 무시
      save();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); save(); return; } // ← return 추가
      if (e.key === 'Escape') { saved = true; render(); return; }
      // 에러 상태에서 타이핑 시작하면 에러 스타일 제거
      if (input.classList.contains('time-error')) {
        input.classList.remove('time-error');
        input.placeholder = '예: 10분';
      }
    });
  });

  return wrap;
}

function makeCard(card, si, colIdx, ci) {

      <button class="card-act edit" onclick="editCardModal(${si},${colIdx},${ci})">✏️</button>
      <button class="card-act del"  onclick="deleteCard(${si},${colIdx},${ci})">✕</button>

function makeLabelBlock(step, si) {

    <div class="card-actions">

function makeParallelGroup(step, si) {
  // colTags 초기화 (기존 데이터 호환)
  if (!step.colTags) step.colTags = step.cols.map(() => []);
  while (step.colTags.length < step.cols.length) step.colTags.push([]);

  const group = document.createElement('div');
  group.className = 'parallel-group';
  group.setAttribute('data-si', si);
  step.cols.forEach((col, colIdx) => {
    // 외부 래퍼: flex:1로 동일 너비 → 중심 보장
    const outerEl = document.createElement('div');
    outerEl.className = 'parallel-col-outer';

    // 열 컨텐츠
    const colEl = document.createElement('div');
    colEl.className = 'parallel-col';

    // 좌측 태그: parallel-col 기준 절대위치 (카드 너비가 기준점이 됨)
    colEl.appendChild(makeParallelLeftTags(step, si, colIdx));
    col.forEach((card, ci) => {
      colEl.appendChild(makeCard(card, si, colIdx, ci));
      if (ci < col.length - 1) colEl.appendChild(makeArrow());
    });
    // 컬럼 내 추가 버튼
    const addBtn = document.createElement('button');
    addBtn.className = 'col-add-btn';
    addBtn.textContent = '＋ 하위 카드';
    addBtn.onclick = () => {
      pendingAdd = { kind: '_parallelCol', stepIdx: si, colIdx };
      editTarget = null;
      clearCardForm();
      document.getElementById('modal-title').textContent = '하위 카드 추가';
      document.getElementById('modal').style.display = 'flex';
      setTimeout(() => document.getElementById('m-title').focus(), 30);
    };
    colEl.appendChild(addBtn);

    outerEl.appendChild(colEl);
    group.appendChild(outerEl);
  });
  return group;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// 줄바꿈도 <br>로 변환 (카드 설명용)
function escNl(s) {
  return esc(s).replace(/\n/g, '<br>');
}

/* ════ 카드 색상 선택 ════ */
const CARD_COLORS = [
  { name: '보라', value: '#6c63ff' },
  { name: '파랑', value: '#74b9ff' },
  { name: '초록', value: '#00b894' },
  { name: '노랑', value: '#fdcb6e' },
  { name: '빨강', value: '#ff6b6b' },
];

function showColorPicker(e, si, colIdx, ci) {
  e.preventDefault();
  closeColorPicker();

  const step = steps[si];
  const card = (step.kind === 'parallel') ? step.cols[colIdx][ci] : step.cards[ci];
  const current = card.color || '#6c63ff';

  const picker = document.createElement('div');
  picker.className = 'color-picker';
  picker.id = '_colorpicker';

  const lbl = document.createElement('span');
  lbl.className = 'color-picker-label';
  lbl.textContent = '띠 색상';
  picker.appendChild(lbl);

  CARD_COLORS.forEach(c => {
    const dot = document.createElement('button');
    dot.type = 'button';
    dot.className = 'color-dot' + (c.value === current ? ' active' : '');
    dot.style.background = c.value;
    dot.title = c.name;
    dot.onclick = () => { setCardColor(si, colIdx, ci, c.value); closeColorPicker(); };
    picker.appendChild(dot);
  });

  document.body.appendChild(picker);

  // 위치 계산 (화면 밖으로 안 나가도록)
  picker.style.top  = (e.clientY + 8) + 'px';
  picker.style.left = e.clientX + 'px';
  const r = picker.getBoundingClientRect();
  if (r.right  > window.innerWidth)  picker.style.left = (window.innerWidth  - r.width  - 8) + 'px';
  if (r.bottom > window.innerHeight) picker.style.top  = (e.clientY - r.height - 8) + 'px';

  setTimeout(() => {
    document.addEventListener('click',        _cpOutside);
    document.addEventListener('contextmenu',  _cpOutside);
  }, 10);
}
function _cpOutside(e) {
  const p = document.getElementById('_colorpicker');
  if (p && !p.contains(e.target)) closeColorPicker();
}
function closeColorPicker() {
  const p = document.getElementById('_colorpicker');
  if (p) {
    p.remove();
    document.removeEventListener('click',       _cpOutside);
    document.removeEventListener('contextmenu', _cpOutside);
  }
}
function setCardColor(si, colIdx, ci, color) {
  pushHistory();
  const step = steps[si];
  if (step.kind === 'parallel') step.cols[colIdx][ci].color = color;
  else                          step.cards[ci].color = color;
  render();
}

/* ════ 바깥 카드 ════ */
function addOutsideCardModal() {
  pendingAdd = { kind: 'outside' };
  editTarget = null;
  document.getElementById('modal-title').textContent = '바깥 카드 추가';
  clearCardForm();
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-title').focus(), 30);
}
function editOutsideCard(cardId) {
  const oc = outsideCards.find(c => c.id === cardId);
  if (!oc) return;
  pendingAdd = { kind: 'outside_edit', id: cardId };
  editTarget = null;
  document.getElementById('modal-title').textContent = '바깥 카드 편집';
  document.getElementById('m-title').value  = oc.title;
  document.getElementById('m-desc').value   = oc.desc   || '';
  document.getElementById('m-answer').value = oc.answer || '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-title').focus(), 30);
}
function deleteOutsideCard(cardId) {
  pushHistory();
  outsideCards = outsideCards.filter(c => c.id !== cardId);
  renderOutsideCards();
}
function showOutsideColorPicker(e, cardId) {
  e.preventDefault();
  closeColorPicker();
  const oc = outsideCards.find(c => c.id === cardId);
  if (!oc) return;
  const current = oc.color || '#6c63ff';

  const picker = document.createElement('div');
  picker.className = 'color-picker';
  picker.id = '_colorpicker';
  const lbl = document.createElement('span');
  lbl.className = 'color-picker-label';
  lbl.textContent = '띠 색상';
  picker.appendChild(lbl);

  CARD_COLORS.forEach(c => {
    const dot = document.createElement('button');
    dot.type = 'button';
    dot.className = 'color-dot' + (c.value === current ? ' active' : '');
    dot.style.background = c.value;
    dot.title = c.name;
    dot.onclick = () => {
      pushHistory();
      oc.color = c.value;
      const el = document.querySelector(`[data-oid="${cardId}"]`);
      if (el) el.style.borderLeftColor = c.value;
      closeColorPicker();
    };
    picker.appendChild(dot);
  });

  document.body.appendChild(picker);
  picker.style.top  = (e.clientY + 8) + 'px';
  picker.style.left = e.clientX + 'px';
  const r = picker.getBoundingClientRect();
  if (r.right  > window.innerWidth)  picker.style.left = (window.innerWidth  - r.width  - 8) + 'px';
  if (r.bottom > window.innerHeight) picker.style.top  = (e.clientY - r.height - 8) + 'px';

  setTimeout(() => {
    document.addEventListener('click',       _cpOutside);
    document.addEventListener('contextmenu', _cpOutside);
  }, 10);
}
function makeOutsideCard(oc) {
  const div = document.createElement('div');
  div.className = 'outside-card';
  div.setAttribute('data-oid', oc.id);
  div.style.left = oc.x + 'px';
  div.style.top  = oc.y + 'px';
  div.style.borderLeftColor = oc.color || '#6c63ff';
  div.innerHTML = `
    <div class="card-title">${esc(oc.title)}</div>
    ${oc.desc   ? `<div class="card-desc">${escNl(oc.desc)}</div>` : ''}
    ${oc.answer ? `<div class="card-answer">${esc(oc.answer)}</div>` : ''}
    <div class="card-actions">
      <button class="card-act edit" onclick="editOutsideCard('${oc.id}')">✏️</button>
      <button class="card-act del"  onclick="deleteOutsideCard('${oc.id}')">✕</button>
    </div>`;
  // 드래그
  div.addEventListener('mousedown', e => {
    if (e.target.closest('.card-actions')) return;
    e.stopPropagation();
    e.preventDefault();
    div.classList.add('dragging');
    draggingOutside = { id: oc.id, startMouseX: e.clientX, startMouseY: e.clientY, startCardX: oc.x, startCardY: oc.y };
  });
  // 우클릭 색상 변경
  div.addEventListener('contextmenu', e => showOutsideColorPicker(e, oc.id));
  return div;
}
function renderOutsideCards() {
  document.querySelectorAll('.outside-card').forEach(el => el.remove());
  const world = document.getElementById('world');
  outsideCards.forEach(oc => world.appendChild(makeOutsideCard(oc)));
}

/* ════════════════════════════════════════
   팬 & 줌
════════════════════════════════════════ */
const viewport = document.getElementById('viewport');
const world    = document.getElementById('world');

let scale = 1;
let panX  = 0;
let panY  = 0;
const MIN_SCALE = 0.2;
const MAX_SCALE = 2.5;

function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoom-pct').textContent = Math.round(scale * 100) + '%';
}

function zoomBy(delta, cx, cy) {
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
  if (newScale === scale) return;

  // 마우스/중심 기준 줌
  const rect = viewport.getBoundingClientRect();
  const mx = (cx !== undefined) ? cx - rect.left : rect.width  / 2;
  const my = (cy !== undefined) ? cy - rect.top  : rect.height / 2;
  const factor = newScale / scale;
  panX = mx - factor * (mx - panX);
  panY = my - factor * (my - panY);
  scale = newScale;
  applyTransform();
}

function resetZoom() {
  scale = 1; panX = 0; panY = 0;
  applyTransform();
}

function fitToView() {
  const canvas = document.getElementById('canvas');
  const cw = canvas.offsetWidth;
  const ch = canvas.offsetHeight;
  const vw = viewport.offsetWidth;
  const vh = viewport.offsetHeight;
  const pad = 60;
  const s = Math.min(MAX_SCALE, Math.max(MIN_SCALE,
    Math.min((vw - pad*2) / cw, (vh - pad*2) / ch)
  ));
  scale = s;
  panX = (vw - cw * s) / 2;
  panY = pad;
  applyTransform();
}

/* ──────────────────────────────────────
   트랙패드 / 마우스 휠 처리
   macOS 트랙패드:
     두 손가락 스크롤 → wheel (ctrlKey: false) → 화면 이동(pan)
     핀치 제스처      → wheel (ctrlKey: true)  → 줌인/아웃
   일반 마우스:
     스크롤 휠 → wheel (ctrlKey: false) → 수직 이동
     Ctrl+휠   → wheel (ctrlKey: true)  → 줌인/아웃
────────────────────────────────────── */
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey) {
    /* 핀치 줌 ─ deltaY: 양수 = 핀치인(축소), 음수 = 핀치아웃(확대) */
    const delta = -e.deltaY * 0.01;
    zoomBy(delta, e.clientX, e.clientY);
  } else {
    /* 두 손가락 스크롤 ─ deltaX/deltaY로 pan */
    panX -= e.deltaX;
    panY -= e.deltaY;
    applyTransform();
  }
}, { passive: false });

/* 터치 핀치 줌 */
let lastPinchDist = null;
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastPinchDist) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    zoomBy((dist - lastPinchDist) * 0.005, cx, cy);
    lastPinchDist = dist;
  }
}, { passive: true });
viewport.addEventListener('touchend', () => { lastPinchDist = null; });

/* 드래그 팬 */
let isPanning = false;
let panStart  = { x: 0, y: 0 };

function isInteractive(el) {
  while (el && el !== viewport) {
    const tag = el.tagName;
    if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
    if (el.classList && (el.classList.contains('card') || el.classList.contains('label-block'))) return true;
    el = el.parentElement;
  }
  return false;
}

viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (isInteractive(e.target)) return;
  // 빈 배경 클릭 시 선택 해제
  if (selectedNode) selectNode(null);
  isPanning = true;
  panStart = { x: e.clientX - panX, y: e.clientY - panY };
  viewport.classList.add('grabbing');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (draggingOutside) {
    const dx = (e.clientX - draggingOutside.startMouseX) / scale;
    const dy = (e.clientY - draggingOutside.startMouseY) / scale;
    const oc = outsideCards.find(c => c.id === draggingOutside.id);
    if (oc) {
      oc.x = draggingOutside.startCardX + dx;
      oc.y = draggingOutside.startCardY + dy;
      const el = document.querySelector(`[data-oid="${oc.id}"]`);
      if (el) { el.style.left = oc.x + 'px'; el.style.top = oc.y + 'px'; }
      draggingOutside.hasMoved = true;
    }
    return;
  }
  if (!isPanning) return;
  panX = e.clientX - panStart.x;
  panY = e.clientY - panStart.y;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  if (draggingOutside) {
    document.querySelector(`[data-oid="${draggingOutside.id}"]`)?.classList.remove('dragging');
    const moved = draggingOutside.hasMoved;
    draggingOutside = null;
    if (moved) saveData(); // 실제로 이동한 경우에만 저장
    return;
  }
  if (isPanning) {
    isPanning = false;
    viewport.classList.remove('grabbing');
  }
});

/* 터치 팬 (단일 터치) */
let touchPanStart = null;
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1 && !isInteractive(e.target)) {
    touchPanStart = {
      x: e.touches[0].clientX - panX,
      y: e.touches[0].clientY - panY
    };
  }
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && touchPanStart) {
    panX = e.touches[0].clientX - touchPanStart.x;
    panY = e.touches[0].clientY - touchPanStart.y;
    applyTransform();
  }
}, { passive: true });
viewport.addEventListener('touchend', () => { touchPanStart = null; });

/* ════ 키보드 ════ */
document.addEventListener('keydown', e => {
  // ⌘Z / Ctrl+Z → 되돌리기
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'z') {
    e.preventDefault(); histUndo(); return;
  }
  // ⌘⇧Z / Ctrl+Shift+Z → 다시 하기
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'z') {
    e.preventDefault(); histRedo(); return;
  }
  if (e.key === 'Escape') {
    closeModal(); closeModalLabel(); closePopup(); closeColorPicker();
    if (selectedNode) selectNode(null);
  }
  if ((e.key === '=' || e.key === '+') && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomBy(0.1); }
  if (e.key === '-' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomBy(-0.1); }
  if (e.key === '0' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); resetZoom(); }
});

/* ════ Enter로 모달 확인 (textarea 제외, 중복 방지 플래그 포함) ════ */
let _submitting = false;
function _guardedConfirm(fn) {
  if (_submitting) return;
  _submitting = true;
  fn();
  setTimeout(() => { _submitting = false; }, 400);
}
document.getElementById('modal').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') _guardedConfirm(confirmModal);
});
document.getElementById('modal-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') _guardedConfirm(confirmLabel);
});


/* ════ 초기화 ════ */
loadData();
render();

// 초기 위치: 캔버스 수평 중앙
setTimeout(() => {
  const vw = viewport.offsetWidth;
  const cw = document.getElementById('canvas').offsetWidth;
  if (panX === 0) panX = (vw - cw) / 2;
  if (panY === 0) panY = 40;
  applyTransform();
}, 50);
</script>
